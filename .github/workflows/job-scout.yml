name: Job Scout — Sabina Kanton

on:
  schedule:
    - cron: '0 15 * * *'   # 8 am PDT (UTC-7). Change to '0 16 * * *' Nov–Mar for PST.
  workflow_dispatch:        # Allows manual "Run workflow" button in GitHub UI

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run job scout
        run: python job_scout.py

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_FROM }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Job Leads for Sabina Kanton — ${{ github.run_id }}"
          to: bianzhengzhen@gmail.com
          from: ${{ secrets.GMAIL_FROM }}
          html_body: file://email_body.html
