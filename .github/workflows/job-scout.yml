name: Job Scout — Dr. K

on:
  workflow_dispatch:        # Triggered by cron-job.org at 8am PT via GitHub API

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run job scout
        run: python job_scout.py

      - name: Get Pacific date
        id: date
        run: echo "today=$(TZ='America/Los_Angeles' date +'%B %d, %Y')" >> $GITHUB_OUTPUT

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_FROM }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Job Leads for Dr. K — ${{ steps.date.outputs.today }}"
          to: ${{ secrets.RECIPIENTS }}
          from: ${{ secrets.GMAIL_FROM }}
          html_body: file://email_body.html
